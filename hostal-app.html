<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hostal">
<link rel="manifest" href="manifest.json">
<title>Hostal · Calculadora</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --card: #16213e;
    --accent: #e94560;
    --accent2: #f5a623;
    --text: #f0f0f0;
    --muted: #7a7a9a;
    --border: rgba(255,255,255,0.08);
    --green: #00d4aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-bottom: 1px solid var(--border);
    padding: 22px 20px 18px;
    position: sticky; top: 0; z-index: 10;
  }

  .header-top { display: flex; align-items: center; gap: 12px; }

  .logo {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  h1 { font-family: 'Syne', sans-serif; font-size: 21px; font-weight: 800; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .container { padding: 20px; max-width: 480px; margin: 0 auto; }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 12px; margin-top: 24px;
    display: flex; align-items: center; gap: 8px;
  }

  .opt-tag {
    font-size: 9px;
    background: rgba(245,166,35,0.12);
    color: var(--accent2);
    border-radius: 4px; padding: 2px 6px;
    letter-spacing: 0.5px;
  }

  /* ROOMS */
  .rooms-list { display: flex; flex-direction: column; gap: 12px; }

  .room-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    animation: popIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .room-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    background: rgba(233,69,96,0.08);
    border-bottom: 1px solid var(--border);
  }

  .room-title {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  .room-num {
    background: var(--accent); color: white;
    width: 24px; height: 24px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  .room-subtotal {
    font-family: 'Syne', sans-serif; font-size: 13px;
    font-weight: 700; color: var(--green);
  }

  .delete-btn {
    background: transparent; border: none;
    color: var(--muted); font-size: 18px;
    cursor: pointer; padding: 4px; border-radius: 8px;
    transition: color 0.2s; margin-left: 8px;
  }

  .delete-btn:hover { color: var(--accent); }



  .room-fields { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

  .field-row { display: flex; align-items: center; gap: 10px; }

  .field-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
  .field-label { font-size: 13px; color: var(--muted); flex: 1; }

  .field-input {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 7px 10px; width: 100px; text-align: center;
    outline: none; transition: border 0.2s, background 0.2s;
    -moz-appearance: textfield;
  }

  .field-input::-webkit-outer-spin-button,
  .field-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .field-input:focus { border-color: var(--accent); background: rgba(233,69,96,0.08); }

  .with-prefix {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 0 8px; transition: border 0.2s, background 0.2s;
  }

  .with-prefix:focus-within { border-color: var(--accent); background: rgba(233,69,96,0.08); }
  .with-prefix span { font-size: 11px; color: var(--muted); }

  .with-prefix input {
    background: transparent; border: none; color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    padding: 7px 4px; width: 75px; text-align: center; outline: none;
    -moz-appearance: textfield;
  }

  .with-prefix input::-webkit-outer-spin-button,
  .with-prefix input::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* ADD BUTTON */
  .add-btn {
    width: 100%;
    background: rgba(233,69,96,0.08);
    border: 1.5px dashed rgba(233,69,96,0.35);
    border-radius: 14px; color: var(--accent);
    padding: 14px; font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 4px;
  }

  .add-btn:hover { background: rgba(233,69,96,0.14); border-color: var(--accent); }

  /* OPTIONAL */
  .opt-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
  }

  .opt-row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px; border-bottom: 1px solid var(--border);
  }

  .opt-row:last-child { border-bottom: none; }

  .opt-icon {
    width: 34px; height: 34px;
    background: rgba(245,166,35,0.1);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  .opt-info { flex: 1; }
  .opt-label { font-size: 13px; font-weight: 500; }
  .opt-hint { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .opt-input {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 0 8px; transition: border 0.2s;
  }

  .opt-input:focus-within { border-color: var(--accent2); background: rgba(245,166,35,0.06); }
  .opt-input span { font-size: 11px; color: var(--muted); }

  .opt-input input {
    background: transparent; border: none; color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    padding: 7px 4px; width: 68px; text-align: center; outline: none;
    -moz-appearance: textfield;
  }

  .opt-input input::-webkit-outer-spin-button,
  .opt-input input::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* CALC BUTTON */
  .calc-btn {
    width: 100%; background: var(--accent); color: white; border: none;
    border-radius: 14px; padding: 16px;
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
    cursor: pointer; margin-top: 24px; transition: transform 0.1s;
  }

  .calc-btn:active { transform: scale(0.97); }

  /* RESULTS */
  .results { display: none; margin-top: 24px; animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
  .results.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .breakdown {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; margin-bottom: 10px;
  }

  .breakdown-header {
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
  }

  .breakdown-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px;
  }

  .breakdown-row:last-child { border-bottom: none; }
  .br-left { color: var(--muted); }
  .br-right { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }

  .result-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 14px;
  }

  .result-card.hl-red   { border-color: rgba(233,69,96,0.4);  background: rgba(233,69,96,0.07); }
  .result-card.hl-green { border-color: rgba(0,212,170,0.4);  background: rgba(0,212,170,0.07); }
  .result-card.hl-yel   { border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.06); }

  .r-icon {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .r-icon.red   { background: rgba(233,69,96,0.18); }
  .r-icon.green { background: rgba(0,212,170,0.18); }
  .r-icon.yel   { background: rgba(245,166,35,0.18); }
  .r-icon.blue  { background: rgba(99,179,237,0.18); }

  .r-label { font-size: 12px; color: var(--muted); margin-bottom: 3px; }

  .r-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .r-value.red   { color: var(--accent); }
  .r-value.green { color: var(--green); }
  .r-value.yel   { color: var(--accent2); }

  .reset-btn {
    width: 100%; background: transparent; border: 1px solid var(--border);
    border-radius: 14px; color: var(--muted); padding: 13px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
    margin-top: 6px; transition: all 0.2s;
  }

  .reset-btn:hover { background: var(--border); color: var(--text); }

  .empty-state {
    text-align: center; color: var(--muted); font-size: 13px;
    padding: 20px; border: 1.5px dashed var(--border); border-radius: 14px;
  }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--green); color: #0f0f1a;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
    padding: 10px 20px; border-radius: 20px;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; z-index: 999; white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">🏨</div>
    <div>
      <h1>Hostal <span>·</span> Cuentas</h1>
      <div class="subtitle">Calculadora por cuarto</div>
    </div>
  </div>
</header>

<div class="container">

  <div class="section-label">Cuartos</div>

  <div class="rooms-list" id="roomsList">
    <div class="empty-state">Presiona "Agregar cuarto" para empezar 👇</div>
  </div>

  <button class="add-btn" onclick="agregarCuarto()">＋ Agregar cuarto</button>

  <div class="section-label">
    Configuración extra
    <span class="opt-tag">OPCIONAL</span>
  </div>

  <div class="opt-card">
    <div class="opt-row">
      <div class="opt-icon">📊</div>
      <div class="opt-info">
        <div class="opt-label">Porcentaje de mamá</div>
        <div class="opt-hint">Del total recaudado</div>
      </div>
      <div class="opt-input">
        <input type="number" id="porcentaje" placeholder="0" min="0" max="100">
        <span>%</span>
      </div>
    </div>
    <div class="opt-row">
      <div class="opt-icon">🔧</div>
      <div class="opt-info">
        <div class="opt-label">Gastos fijos</div>
        <div class="opt-hint">Luz, agua, limpieza…</div>
      </div>
      <div class="opt-input">
        <span>Bs.</span>
        <input type="number" id="gastos" placeholder="0" min="0">
      </div>
    </div>
  </div>

  <button class="calc-btn" onclick="calcular()">⚡ Calcular ahora</button>

  <div class="results" id="results">
    <div class="section-label" style="margin-top:24px;">Resultado</div>

    <div class="breakdown" id="breakdown"></div>

    <div class="result-card hl-red">
      <div class="r-icon red">💵</div>
      <div>
        <div class="r-label">Total recaudado</div>
        <div class="r-value red" id="val-total">—</div>
      </div>
    </div>

    <div class="result-card hl-yel" id="card-neto" style="display:none">
      <div class="r-icon yel">🔧</div>
      <div>
        <div class="r-label">Después de gastos</div>
        <div class="r-value yel" id="val-neto">—</div>
      </div>
    </div>

    <div class="result-card hl-green" id="card-mama" style="display:none">
      <div class="r-icon green">👩‍💼</div>
      <div>
        <div class="r-label">Ganancia de mamá</div>
        <div class="r-value green" id="val-mama">—</div>
      </div>
    </div>

    <div class="result-card" id="card-resto" style="display:none">
      <div class="r-icon blue">🏨</div>
      <div>
        <div class="r-label">Para el hostal</div>
        <div class="r-value" id="val-resto">—</div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetear()">🔄 Nueva cuenta</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let roomCount = 0;
let roomIds = [];

function agregarCuarto() {
  roomCount++;
  const id = roomCount;
  roomIds.push(id);

  const list = document.getElementById('roomsList');
  const empty = list.querySelector('.empty-state');
  if (empty) empty.remove();

  const card = document.createElement('div');
  card.className = 'room-card';
  card.id = 'room-' + id;

  card.innerHTML = `
    <div class="room-header">
      <div class="room-title">
        <div class="room-num">${id}</div>
        Habitación ${id}
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="room-subtotal" id="sub-${id}"></span>
        <button class="delete-btn" onclick="eliminarCuarto(${id})">✕</button>
      </div>
    </div>
    <div class="room-fields">
      <div class="field-row">
        <span class="field-icon">🚪</span>
        <span class="field-label">Nro. habitación</span>
        <input type="text" class="field-input" id="name-${id}" placeholder="Ej: 101" maxlength="12" style="font-size:14px;">
      </div>
      <div class="field-row">
        <span class="field-icon">👥</span>
        <span class="field-label">Personas</span>
        <input type="number" class="field-input" id="per-${id}" placeholder="0" min="0" oninput="actualizarSub(${id})">
      </div>
      <div class="field-row">
        <span class="field-icon">💰</span>
        <span class="field-label">Precio por persona</span>
        <div class="with-prefix">
          <span>Bs.</span>
          <input type="number" id="price-${id}" placeholder="0" min="0" oninput="actualizarSub(${id})">
        </div>
      </div>
    </div>
  `;

  list.appendChild(card);
}

function eliminarCuarto(id) {
  const card = document.getElementById('room-' + id);
  if (card) card.remove();
  roomIds = roomIds.filter(r => r !== id);

  const list = document.getElementById('roomsList');
  if (list.children.length === 0) {
    list.innerHTML = '<div class="empty-state">Presiona "Agregar cuarto" para empezar 👇</div>';
  }
}

function actualizarSub(id) {
  const per   = parseFloat(document.getElementById('per-' + id)?.value)   || 0;
  const price = parseFloat(document.getElementById('price-' + id)?.value) || 0;
  const sub   = document.getElementById('sub-' + id);
  if (!sub) return;
  const total = per * price;
  sub.textContent = total > 0 ? bs(total) : '';
}

function calcular() {
  const activos = roomIds.filter(id => document.getElementById('room-' + id));

  if (activos.length === 0) {
    mostrarToast('⚠️ Agrega al menos un cuarto');
    return;
  }

  let totalGeneral = 0;
  const filas = [];

  activos.forEach(id => {
    const per   = parseFloat(document.getElementById('per-' + id)?.value)   || 0;
    const price = parseFloat(document.getElementById('price-' + id)?.value) || 0;
    const sub   = per * price;
    totalGeneral += sub;
    const nameEl = document.getElementById('name-' + id);
    const nombre = (nameEl && nameEl.value.trim()) ? nameEl.value.trim() : 'Hab. ' + id;
    filas.push({ id, nombre, per, price, sub });
  });

  const porcentaje = parseFloat(document.getElementById('porcentaje').value) || 0;
  const gastos     = parseFloat(document.getElementById('gastos').value)     || 0;

  // Desglose
  const breakdown = document.getElementById('breakdown');
  const rows = filas.map(f =>
    `<div class="breakdown-row">
      <div class="br-left">🚪 ${f.nombre} &nbsp;·&nbsp; ${f.per} pers. × Bs.${f.price}</div>
      <div class="br-right">${bs(f.sub)}</div>
    </div>`
  ).join('');

  breakdown.innerHTML = `<div class="breakdown-header">Desglose por cuarto</div>${rows}`;

  document.getElementById('val-total').textContent = bs(totalGeneral);

  const neto = totalGeneral - gastos;
  if (gastos > 0) {
    document.getElementById('card-neto').style.display = 'flex';
    document.getElementById('val-neto').textContent = bs(Math.max(neto, 0));
  } else {
    document.getElementById('card-neto').style.display = 'none';
  }

  const base = gastos > 0 ? Math.max(neto, 0) : totalGeneral;
  if (porcentaje > 0) {
    const mama  = base * (porcentaje / 100);
    const resto = base - mama;
    document.getElementById('card-mama').style.display = 'flex';
    document.getElementById('val-mama').textContent = `${bs(mama)} (${porcentaje}%)`;
    document.getElementById('card-resto').style.display = 'flex';
    document.getElementById('val-resto').textContent = bs(resto);
  } else {
    document.getElementById('card-mama').style.display = 'none';
    document.getElementById('card-resto').style.display = 'none';
  }

  const results = document.getElementById('results');
  results.classList.add('visible');
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetear() {
  const list = document.getElementById('roomsList');
  list.innerHTML = '<div class="empty-state">Presiona "Agregar cuarto" para empezar 👇</div>';
  roomCount = 0;
  roomIds = [];
  document.getElementById('porcentaje').value = '';
  document.getElementById('gastos').value = '';
  document.getElementById('results').classList.remove('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function bs(n) {
  return 'Bs. ' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
